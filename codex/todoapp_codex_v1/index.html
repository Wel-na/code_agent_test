<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Current</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Daily Planner</p>
      <h1>Build a calmer list.</h1>
      <p class="hero-copy">
        Capture tasks, finish what matters, and keep the clutter out of the way.
      </p>
      <form class="task-form" id="task-form">
        <label class="sr-only" for="task-input">New task</label>
        <input id="task-input" name="task" type="text" maxlength="120" placeholder="Add a task" autocomplete="off" required>
        <button type="submit">Add Task</button>
      </form>
    </section>

    <section class="board">
      <header class="board-header">
        <div>
          <p class="board-label">Overview</p>
          <h2>Your tasks</h2>
        </div>
        <div class="stats" id="stats">
          <span>0 total</span>
          <span>0 done</span>
        </div>
      </header>

      <div class="filters" role="tablist" aria-label="Task filters">
        <button class="filter is-active" data-filter="all" type="button">All</button>
        <button class="filter" data-filter="active" type="button">Active</button>
        <button class="filter" data-filter="done" type="button">Done</button>
      </div>

      <ul class="task-list" id="task-list" aria-live="polite"></ul>

      <template id="task-template">
        <li class="task-item">
          <label class="task-main">
            <input class="task-toggle" type="checkbox">
            <span class="task-text"></span>
          </label>
          <div class="task-actions">
            <button class="ghost-button task-edit" type="button">Edit</button>
            <button class="ghost-button task-delete" type="button">Delete</button>
          </div>
        </li>
      </template>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
